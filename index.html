<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#08503d">
<meta name="description" content="رفيق — كونسول العمليات الميداني للمطوّف | Rafeeq field-ops console for mutawwifs">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Rafeeq">
<title>رفيق للمطوفين | Rafeeq for Mutawwifs</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zain:wght@400;700;800;900&family=Readex+Pro:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f4ee; --card:#fffdf9; --ink:#191f1c; --muted:#68716c; --line:#e4e0d5;
  --brand:#0a6b52; --brand-deep:#08503d; --brand-soft:#e3efe9;
  --sand:#a8842c; --sand-soft:#f4ecd9;
  --red:#c03a2e; --red-soft:#f9e3e0; --amber:#b26f06; --amber-soft:#f8edd4;
  --green:#237a4f; --green-soft:#e0f0e5;
  --radius:12px; --shadow:0 1px 2px rgba(25,31,28,.06),0 4px 14px -8px rgba(25,31,28,.08);
  --disp:'Zain','Readex Pro',sans-serif; --body:'Readex Pro','Segoe UI',Tahoma,sans-serif;
}
[data-theme="dark"]{
  --bg:#12120f; --card:#1b1c17; --ink:#ece9df; --muted:#98978a; --line:#31322a;
  --brand:#37b48c; --brand-deep:#0c3c2f; --brand-soft:#15382c;
  --sand:#d3ac54; --sand-soft:#2f2814;
  --red:#ef6c5f; --red-soft:#3c1a16; --amber:#e0a63e; --amber-soft:#342709;
  --green:#4dbf7f; --green-soft:#13301f;
  --shadow:0 1px 2px rgba(0,0,0,.5),0 6px 18px -8px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--body);background:var(--bg);color:var(--ink);display:flex;min-height:100vh;
  transition:background .2s,color .2s;font-size:14px;line-height:1.55;
  font-feature-settings:"tnum" 1}
h1,h2,h3,.kpi .n,.rail .logo{font-family:var(--disp)}
.mono{font-family:'IBM Plex Mono',monospace}

/* ===== RAIL — grouped, labeled ===== */
.rail{width:200px;background:var(--card);border-inline-end:1px solid var(--line);
  display:flex;flex-direction:column;padding:18px 12px;gap:2px;position:sticky;top:0;height:100vh;
  overflow-y:auto;flex-shrink:0;scrollbar-width:none}
.rail::-webkit-scrollbar{width:0}
.brand{display:flex;align-items:center;gap:10px;padding:2px 8px 14px;margin-bottom:10px;
  border-bottom:3px solid transparent;
  border-image:linear-gradient(90deg,var(--sand) 0 34%,var(--line) 34% 100%) 1}
.brand .mark{width:40px;height:40px;border-radius:11px;background:var(--brand-deep);color:#f2e7c8;
  display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:800;font-size:21px;flex-shrink:0}
.brand .bt{font-family:var(--disp);font-weight:800;font-size:17px;line-height:1.05}
.brand .bs{font-size:9.5px;color:var(--sand);letter-spacing:1.6px;font-weight:600}
.rail .sec{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--muted);
  text-transform:uppercase;padding:12px 10px 5px}
.rail button{display:flex;align-items:center;gap:10px;width:100%;border:0;background:transparent;
  color:var(--muted);border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--body);
  padding:8px 10px;transition:.12s;text-align:start;position:relative}
.rail button .ic{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.rail button:hover{background:var(--bg);color:var(--ink)}
.rail button.active{background:var(--brand-soft);color:var(--brand);font-weight:700}
.rail button.active::before{content:'';position:absolute;inset-inline-start:-12px;top:6px;bottom:6px;
  width:3px;border-radius:3px;background:var(--brand)}
.rail button .bdg{position:relative}
.rail button .dot{position:absolute;top:-2px;inset-inline-end:-5px;width:7px;height:7px;border-radius:50%;
  background:var(--red);box-shadow:0 0 0 2px var(--card)}
.nav-more-btn{border:1.5px dashed var(--line)!important;margin-top:6px}

/* ===== MAIN / HEADER ===== */
.main{flex:1;padding:20px 26px 64px;overflow:auto;max-width:1180px}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.top h1{font-size:26px;font-weight:800;letter-spacing:-.01em;line-height:1.1}
.top .sub{color:var(--muted);font-size:12.5px;margin-top:3px}
.daychip{display:inline-flex;align-items:center;gap:6px;background:var(--sand-soft);color:var(--sand);
  border:1px solid color-mix(in srgb,var(--sand) 30%,transparent);
  border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700;margin-top:8px}
.ctrls{display:flex;gap:8px;flex-wrap:wrap}
.ctrls button{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:9px;
  padding:8px 13px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--body);box-shadow:var(--shadow)}
.ctrls button:hover{border-color:var(--brand);color:var(--brand)}

/* ===== MISBAHA STRIP (signature) ===== */
.misbaha{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:12px 16px;margin:16px 0;box-shadow:var(--shadow)}
.misbaha .mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.misbaha .mt{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--muted);text-transform:uppercase}
.misbaha .legend{display:flex;gap:12px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.misbaha .legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-inline-end:4px;vertical-align:-1px}
.beads{display:flex;gap:5px;flex-wrap:wrap}
.bead{width:15px;height:15px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.bead:hover{transform:scale(1.45)}
.bead.g{background:var(--green)} .bead.a{background:var(--amber)} .bead.r{background:var(--red);animation:blink 1.2s infinite}
.bead.hollow{background:transparent!important;border-color:currentColor}
.bead.hollow.g{color:var(--green)} .bead.hollow.a{color:var(--amber)} .bead.hollow.r{color:var(--red)}
@keyframes blink{50%{opacity:.35}}

/* ===== LAYOUT ===== */
.grid{display:grid;gap:14px}
.g4{grid-template-columns:repeat(4,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1020px){.g4{grid-template-columns:repeat(2,1fr)}.g3,.g2{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.card h3{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.card h3 .hint{font-size:11px;color:var(--muted);font-weight:500;font-family:var(--body)}

/* ===== ATOMS ===== */
.kpi{position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;inset-inline-start:0;top:14px;bottom:14px;width:3px;border-radius:3px;background:var(--line)}
.kpi.k-g::after{background:var(--green)} .kpi.k-a::after{background:var(--amber)}
.kpi.k-r::after{background:var(--red)} .kpi.k-b::after{background:var(--brand)}
.kpi .n{font-size:34px;font-weight:900;line-height:1;letter-spacing:-.02em}
.kpi .l{color:var(--muted);font-size:12px;margin-top:6px;font-weight:500}
.pill{padding:3px 10px;border-radius:7px;font-size:11px;font-weight:700;white-space:nowrap}
.pill.g{background:var(--green-soft);color:var(--green)}
.pill.a{background:var(--amber-soft);color:var(--amber)}
.pill.r{background:var(--red-soft);color:var(--red)}
.pill.b{background:var(--brand-soft);color:var(--brand)}
.pill.s{background:var(--sand-soft);color:var(--sand)}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}
.row:last-child{border:0}
.btn{background:var(--brand);color:#fff;border:0;border-radius:9px;padding:9px 16px;cursor:pointer;
  font-weight:700;font-size:13px;font-family:var(--body);transition:.15s;box-shadow:var(--shadow)}
.btn:hover{filter:brightness(1.09)}
.btn.red{background:var(--red)} .btn.amber{background:var(--amber)}
.btn.ghost{background:transparent;color:var(--brand);border:1.5px solid var(--brand);box-shadow:none}
.btn.sm{padding:6px 12px;font-size:12px}
.bar{height:7px;background:var(--line);border-radius:6px;overflow:hidden;margin:6px 0 12px}
.bar>i{display:block;height:100%;background:var(--brand);border-radius:6px;transition:width .4s}
.view{display:none;animation:fade .18s ease} .view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.view,.bar>i,.bead{animation:none!important;transition:none!important}}
input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;
  background:var(--bg);color:var(--ink);margin-top:4px;font-size:13px;font-family:var(--body)}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--brand);outline-offset:1px}
label{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-top:10px}
.toast{position:fixed;bottom:20px;inset-inline-start:20px;background:var(--ink);color:var(--bg);
  padding:12px 18px;border-radius:11px;font-size:13px;font-weight:600;opacity:0;transform:translateY(20px);
  transition:.25s;z-index:99;max-width:360px;box-shadow:0 8px 30px rgba(0,0,0,.25);pointer-events:none}
.toast.show{opacity:1;transform:none;pointer-events:auto}
.plist .row{cursor:pointer;border-radius:9px;padding-inline:8px}
.plist .row:hover{background:var(--bg)}
.avatar{width:34px;height:34px;border-radius:10px;background:var(--brand-soft);color:var(--brand);
  display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;font-family:var(--disp)}
.pmeta{display:flex;align-items:center;gap:10px;min-width:0}
.pmeta .nm{font-weight:600} .pmeta .id{font-size:11px;color:var(--muted)}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tabs button{border:1.5px solid var(--line);background:var(--card);color:var(--muted);border-radius:8px;
  padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--body)}
.tabs button.on{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.zone{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border:1px solid var(--line);
  border-radius:10px;margin-bottom:8px;background:var(--bg)}
.zone .zl{font-weight:700;font-size:13px} .zone .zs{font-size:11px;color:var(--muted);margin-top:2px}
.spark{display:flex;align-items:flex-end;gap:3px;height:60px;margin-top:10px}
.spark i{flex:1;background:var(--brand);opacity:.8;border-radius:3px 3px 0 0}
.spark i.hot{background:var(--red);opacity:1}
.modal{position:fixed;inset:0;background:rgba(15,17,14,.55);backdrop-filter:blur(2px);
  display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal.open{display:flex}
.modal .box{background:var(--card);border-radius:16px;border-top:4px solid var(--sand);
  padding:20px;width:100%;max-width:440px;max-height:88vh;overflow:auto}
.modal .box h3{margin-bottom:8px;font-size:17px;font-weight:800}
.chip{display:inline-block;background:var(--bg);border:1.5px solid var(--line);border-radius:8px;
  padding:5px 11px;font-size:12px;font-weight:600;margin:3px 2px;cursor:pointer;transition:.12s}
.chip:hover{border-color:var(--brand);color:var(--brand)}
.tl{border-inline-start:2px solid var(--line);padding-inline-start:14px;margin-inline-start:6px}
.tl .ev{position:relative;padding-bottom:14px}
.tl .ev::before{content:'';position:absolute;inset-inline-start:-20.5px;top:4px;width:9px;height:9px;
  border-radius:50%;background:var(--sand);box-shadow:0 0 0 3px var(--sand-soft)}
.tl .ev .t{font-size:11px;color:var(--muted)} .tl .ev .d{font-size:13px;font-weight:600;margin-top:2px}
.vitals{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.vitals .v{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:8px;text-align:center}
.vitals .v .vn{font-weight:800;font-size:17px;font-family:var(--disp)} .vitals .v .vl{font-size:10px;color:var(--muted)}
@media(max-width:900px){
  .rail{width:64px;padding:14px 8px}
  .rail .sec,.rail .brand .bt,.rail .brand .bs,.rail button span:not(.ic){display:none}
  .rail button{justify-content:center;padding:10px 0}
  .brand{justify-content:center;padding-bottom:12px}
}
@media(max-width:640px){.g4{grid-template-columns:1fr 1fr}.main{padding:14px 14px 60px}.top h1{font-size:21px}}
/* ===== CROWD MAP ===== */
#crowdMapWrap{position:relative;touch-action:none}
#crowdMap{display:block;width:100%;height:auto;background:color-mix(in srgb,var(--brand-deep) 6%,var(--bg))}
.map-tip{position:absolute;background:var(--ink);color:var(--bg);padding:7px 11px;border-radius:9px;font-size:11px;font-weight:600;pointer-events:none;z-index:5;max-width:220px;box-shadow:var(--shadow);transform:translate(-50%,-110%)}
.map-ctrl{border:1.5px solid var(--line);background:var(--card);color:var(--muted);border-radius:8px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--body)}
.map-ctrl.on{background:var(--brand-soft);border-color:var(--brand);color:var(--brand)}
.cmap-dot{cursor:pointer;transition:opacity .15s}
.cmap-dot:hover{opacity:1!important}
/* ===== polish: interaction states ===== */
.btn:active,.ctrls button:active,.tabs button:active,.chip:active{transform:scale(.97)}
.rail button:active{transform:scale(.98)}
button{-webkit-tap-highlight-color:transparent}
select{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
  background-position:calc(100% - 18px) 55%,calc(100% - 13px) 55%;background-size:5px 5px;background-repeat:no-repeat;padding-inline-end:32px}
[dir="rtl"] select{background-position:18px 55%,13px 55%}
/* toast accent */
.toast{border-inline-start:4px solid var(--sand)}
/* KPI icon chip */
.kpi .ki{position:absolute;top:14px;inset-inline-end:14px;font-size:17px;opacity:.85}
/* header hairline */
.top{padding-bottom:4px}
/* scrollbar */
.main::-webkit-scrollbar,.rail::-webkit-scrollbar{width:8px}
.main::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.main::-webkit-scrollbar-thumb:hover{background:var(--muted)}
/* modal entrance */
.modal .box{animation:pop .16s ease}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.modal .box{animation:none}}
/* empty state */
.empty{color:var(--muted);font-size:13px;text-align:center;padding:18px 8px}
.empty .ei{font-size:26px;display:block;margin-bottom:6px;opacity:.7}
/* spark baseline */
.spark{border-bottom:1.5px solid var(--line);padding-bottom:1px}
/* print header */
.printhead{display:none}
@media print{
  .rail,.ctrls,.btn,.tabs,.misbaha,#offlineBar,.fab-scan,#moreDrawer,.sos-strip{display:none!important}
  .main{padding:0}.view{display:none}.view.active{display:block}
  .printhead{display:block;border-bottom:2px solid #000;margin-bottom:14px;padding-bottom:8px}
  .printhead .ph1{font-weight:800;font-size:18px}.printhead .ph2{font-size:11px;color:#555}
  body{background:#fff;color:#000}.card{box-shadow:none;border-color:#ccc}
}
/* ===== ENHANCEMENTS ===== */
.offline-bar{display:none;align-items:center;justify-content:space-between;background:var(--amber-soft);color:var(--amber);border:1px solid var(--amber);border-radius:11px;padding:10px 14px;margin-bottom:14px;font-size:13px;font-weight:600}
.offline-bar.show{display:flex}
.sim-badge,.judge-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;margin-inline-start:6px}
.sim-badge{background:var(--sand-soft);color:var(--sand);border:1px solid color-mix(in srgb,var(--sand) 40%,transparent)}
.judge-badge{background:var(--brand-soft);color:var(--brand)}
.sos-strip{background:var(--red);color:#fff;border-radius:11px;padding:12px 16px;margin-bottom:12px;animation:sosPulse 1.5s infinite}
.sos-strip[hidden]{display:none!important}
.sos-strip-inner{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px}
.sos-btns{display:flex;gap:6px;flex-wrap:wrap}
@keyframes sosPulse{50%{box-shadow:0 0 0 4px rgba(192,58,46,.25)}}
.action-strip{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;box-shadow:var(--shadow)}
.act-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.act-chips{display:flex;gap:8px;flex-wrap:wrap}
.act-chip{border:1.5px solid var(--line);background:var(--bg);border-radius:10px;padding:10px 14px;min-height:48px;min-width:72px;cursor:pointer;font-size:11px;font-weight:700;font-family:var(--body);color:var(--ink);display:flex;flex-direction:column;align-items:center;gap:2px}
.act-chip .act-n{font-size:20px;font-weight:900;font-family:var(--disp);line-height:1}
.act-chip.r{border-color:var(--red);background:var(--red-soft);color:var(--red)}
.act-chip.a{border-color:var(--amber);background:var(--amber-soft);color:var(--amber)}
.act-chip.b{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}
.fab-scan{position:fixed;bottom:24px;inset-inline-end:24px;width:58px;height:58px;border-radius:50%;background:var(--brand-deep);color:#fff;border:0;font-size:24px;cursor:pointer;box-shadow:0 6px 24px rgba(8,80,61,.45);z-index:40;display:flex;align-items:center;justify-content:center}
.fab-scan span{font-size:10px;font-weight:800;display:block;margin-top:-2px}
@media(min-width:901px){.fab-scan{bottom:28px;inset-inline-end:28px}}
#moreDrawer{position:fixed;inset:0;background:rgba(15,17,14,.5);z-index:60;display:none;align-items:flex-end;justify-content:flex-end;padding:16px}
#moreDrawer.open{display:flex}
#moreDrawer .drawer{background:var(--card);border-radius:16px 16px 0 0;padding:18px;width:min(320px,100%);max-height:80vh;overflow:auto;border:1px solid var(--line)}
#moreDrawer button{display:flex;align-items:center;gap:10px;width:100%;border:0;background:var(--bg);padding:12px;border-radius:10px;margin-bottom:6px;cursor:pointer;font-weight:600;font-size:13px;font-family:var(--body)}
.alert-row{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;background:var(--bg)}
.alert-row.sev-r{border-color:var(--red);background:var(--red-soft)}
.alert-row.sev-a{border-color:var(--amber)}
.alert-ic{font-size:22px;flex-shrink:0}
.alert-body{flex:1;cursor:pointer;min-width:0}
.crowd-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.crowd-tabs button{border:1.5px solid var(--line);background:var(--card);padding:8px 16px;border-radius:9px;font-weight:700;font-size:12px;cursor:pointer;font-family:var(--body);min-height:44px}
.crowd-tabs button.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.crowd-panel{display:none}.crowd-panel.on{display:block}
.nav-ext{display:none}
body.track3-mode .track3-hide{display:none!important}
body.track3-mode .nav-ext-judge{display:flex}
body.judge-mode .nav-ext-judge{display:flex}
body.judge-mode #demoBtn{display:none}
body.judge-mode .ctrls .judge-hide{display:none}
body.manager-mode .rail button[data-v]:not([data-v="dash"]){opacity:.5}
.tel{color:var(--brand);font-weight:700;text-decoration:none}
.cite{font-size:10px;color:var(--muted);margin-top:8px}
body.high-contrast{--line:#000;--muted:#333}
body.high-contrast .card{border-width:2px}
body.high-contrast{font-size:15px}
@media(max-width:640px){body{font-size:15px}.btn,.act-chip,.crowd-tabs button{min-height:48px}}
.sensor-grid-5{grid-template-columns:repeat(5,1fr)}
@media(max-width:1020px){.sensor-grid-5{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.sensor-grid-5{grid-template-columns:1fr}}
.cmap-hit{cursor:pointer}
.flow-now{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin:8px 0}
.flow-arrow{text-align:center;padding:14px;border-radius:12px;background:var(--bg)}
.flow-in{border:2px solid var(--green)}.flow-out{border:2px solid var(--brand)}
.flow-net{font-size:22px;font-weight:900;font-family:var(--disp)}
.flow-pipe{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.flow-step{flex:1;min-width:120px;padding:10px;border-radius:10px;border:1px solid var(--line);background:var(--bg);font-size:12px}
.flow-step.hot{border-color:var(--red);background:var(--red-soft)}
.flow-bars{display:flex;gap:3px;align-items:flex-end;height:40px}
.flow-bars i{flex:1;border-radius:3px 3px 0 0;min-height:3px}
.flow-bars i.in{background:var(--green)}.flow-bars i.out{background:var(--brand)}
.mcit-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.mcit-row:last-child{border:0}
.mcit-row .ok{color:var(--green);font-weight:900;flex-shrink:0;font-size:15px}
.mcit-row a{color:var(--brand);font-weight:700;cursor:pointer;text-decoration:none}
</style>
</head>

  <div class="misbaha">

        <span><i style="background:var(--amber)"></i><span data-i="st_med"></span></span>
        <span><i style="background:var(--red)"></i><span data-i="st_miss"></span></span>

  </div>

  </div>

      </div>

        <h3 data-i="livefeed"></h3>
        <div id="dashFeed"></div>
      </div>

  <!-- ============ ALERTS INBOX ============ -->

      <div id="flowPrediction"></div>

        </div>

    </div>

        <textarea rows="3" id="trIn"></textarea>

/* ================= GEO ENGINE (haversine, computed — not mocked) ================= */
const FENCE_M=250;
function haversine(a,b){
  const R=6371000,toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat),dLng=toR(b.lng-a.lng);
  const h=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return Math.round(2*R*Math.asin(Math.sqrt(h)));
}
function centroid(){
  const inG=P.filter(p=>p.status!=="miss");
  return {lat:inG.reduce((s,p)=>s+p.lat,0)/inG.length,lng:inG.reduce((s,p)=>s+p.lng,0)/inG.length};
}
function bearing(a,b){
  const dirs=lang==="ar"?["شمال","شمال شرق","شرق","جنوب شرق","جنوب","جنوب غرب","غرب","شمال غرب"]
                        :["N","NE","E","SE","S","SW","W","NW"];
  const ang=(Math.atan2(b.lng-a.lng,b.lat-a.lat)*180/Math.PI+360)%360;
  return dirs[Math.round(ang/45)%8];
}
function driftList(){
  const c=centroid();
  return P.map(p=>({p,d:haversine(c,{lat:p.lat,lng:p.lng}),dir:bearing(c,p)}))
          .filter(x=>x.d>FENCE_M&&x.p.status!=="miss").sort((a,b)=>b.d-a.d);
}

const MAP_B={minLat:21.4088,maxLat:21.4172,minLng:39.8898,maxLng:39.8972,w:560,h:380};
const MAP_ZONE_POS=[
  {lat:21.4149,lng:39.8949,lv:0,r:58},{lat:21.4133,lng:39.8934,lv:1,r:48},{lat:21.4127,lng:39.8926,lv:2,r:40},
  {lat:21.4156,lng:39.8912,lv:3,r:44},{lat:21.4108,lng:39.8958,lv:4,r:46}
];
let mapLayers={heat:true,dots:true,trails:true,fence:true};
const MAP_HEAT=["rgba(192,58,46,.34)","rgba(178,111,6,.28)","rgba(35,122,79,.22)","rgba(178,111,6,.26)","rgba(35,122,79,.20)"];
const MAP_DOT={present:"#237a4f",med:"#b26f06",miss:"#c03a2e"};
function gpsXY(lat,lng){
  const b=MAP_B;
  return {x:((lng-b.minLng)/(b.maxLng-b.minLng))*b.w,y:((b.maxLat-lat)/(b.maxLat-b.minLat))*b.h};
}
function fencePx(c){
  const e=gpsXY(c.lat,c.lng+(FENCE_M/111320)/Math.cos(c.lat*Math.PI/180));
  const p=gpsXY(c.lat,c.lng);
  return Math.abs(e.x-p.x);
}
function pushTrail(p){
  if(!p.trail)p.trail=[];
  const last=p.trail[p.trail.length-1];
  if(!last||Math.hypot(p.lat-last.lat,p.lng-last.lng)>0.000008){
    p.trail.push({lat:p.lat,lng:p.lng,t:Date.now()});
    if(p.trail.length>18)p.trail.shift();
  }
}
function seedTrails(){
  P.forEach(p=>{
    if(!p.trail)p.trail=[];
    if(p.trail.length)return;
    for(let k=4;k>=1;k--)
      p.trail.push({lat:p.lat-(seed(p.i+k)-.5)*0.00018*k,lng:p.lng+(seed(p.i+k+1)-.5)*0.00014*k,t:Date.now()-k*12000});
  });
}

/* ================= FORECAST ENGINE (computed model — not hardcoded) ================= */
// density(zone,hour) = base ritual-calendar curve × Arafah-day multiplier × zone factor
const FC_MODEL={
  base:[.42,.55,.68,.62,.5,.4],                 // afternoon profile, 1PM..6PM
  zone:{0:{f:1.45,ph:0},1:{f:1.15,ph:1},3:{f:1.0,ph:3}}, // Jamarat amplifies, gates peak later
  day:1.12                                       // 9 Dhul Hijjah pressure
};
function computeForecast(z){
  const m=FC_MODEL,zf=m.zone[z]||{f:1,ph:0};
  const lv=m.base.map((b,i)=>{
    const shift=m.base[(i-zf.ph+6)%6];
    return Math.min(98,Math.round(shift*zf.f*m.day*100+seed(z*10+i)*6));
  });
  const peak=lv.indexOf(Math.max(...lv));
  const varc=lv.reduce((s,v)=>s+Math.abs(v-lv[peak]/1.6),0)/lv.length;
  return {lv,peak,conf:Math.max(74,Math.min(95,Math.round(96-varc/4)))};
}
/* ================= FLOW ENGINE (directional in/out — computed from density model) ================= */
const FLOW_NOW_H=2; // simulated current slot index (1PM=0 .. 6PM=5)
const FLOW_PIPELINE=[
  {z:0,next:4,na:"flow_jamarat",nb:"flow_mina"},
  {z:4,next:1,na:"flow_mina",nb:"flow_mataf"},
  {z:1,next:2,na:"flow_mataf",nb:"flow_masaa"},
];
function computeFlow(z,hourIdx){
  const zf=FC_MODEL.zone[z]||{f:1,ph:0};
  const dens=computeForecast(z).lv[hourIdx]/100;
  const cap=1100;
  const pressure=cap*dens*zf.f*FC_MODEL.day;
  const ritualWave=Math.sin((hourIdx-zf.ph+1)*1.1)*0.18+0.92;
  const inflow=Math.round(pressure*ritualWave*(0.88+seed(z*7+hourIdx)*0.12));
  const egressLag=hourIdx>=computeForecast(z).peak?1.08:0.78;
  const outflow=Math.round(pressure*egressLag*(0.7+seed(z*11+hourIdx)*0.18));
  return {inflow,outflow,net:inflow-outflow,dens:Math.round(dens*100)};
}
function computeFlowSeries(z){
  const hours=lang==="ar"?["١م","٢م","٣م","٤م","٥م","٦م"]:["1PM","2PM","3PM","4PM","5PM","6PM"];
  return hours.map((h,i)=>{const f=computeFlow(z,i);return {h,...f,building:f.net>60};});
}

function idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(IDB_NAME,IDB_VER);
    r.onupgradeneeded=()=>r.result.createObjectStore(IDB_STORE);
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
function idbGet(key){
  return idbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,"readonly");
    const req=tx.objectStore(IDB_STORE).get(key);
    req.onsuccess=()=>res(req.result);
    req.onerror=()=>rej(req.error);
  })).catch(()=>null);
}
function idbSet(key,val){
  return idbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,"readwrite");
    tx.objectStore(IDB_STORE).put(val,key);
    tx.oncomplete=res;
    tx.onerror=()=>rej(tx.error);
  }));
}
function idbDel(key){
  return idbOpen().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,"readwrite");
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete=res;
    tx.onerror=()=>rej(tx.error);
  })).catch(()=>{});
}
async function loadSnap(){
  let snap=await idbGet(DB_KEY);
  if(snap)return snap;
  try{
    const raw=localStorage.getItem(DB_KEY);
    if(!raw)return null;
    snap=JSON.parse(raw);
    if(snap.v===2){await idbSet(DB_KEY,snap);try{localStorage.removeItem(DB_KEY)}catch(e){}}
    return snap;
  }catch(e){return null}
}
function persist(){

}

function download(name,mime,content){
  const a=document.createElement("a");
  try{a.href=URL.createObjectURL(new Blob([content],{type:mime}))}
  catch(e){a.href="data:"+mime+";charset=utf-8,"+encodeURIComponent(content)}
  a.download=name;a.click();
  if(a.href.startsWith("blob:"))try{URL.revokeObjectURL(a.href)}catch(e){}
}

function nameList(arr,max=6){
  const shown=arr.slice(0,max).map(p=>`${p.nat[0]} ${nm(p)} <span class="mono" style="font-size:11px;color:var(--muted)">${p.id}</span>`);
  const more=arr.length>max?(lang==="ar"?` <b>+${arr.length-max} آخرين</b>`:` <b>+${arr.length-max} more</b>`):"";
  return shown.map(s=>`<div class="row"><span>${s}</span></div>`).join("")+more;
}
function rulesAnswer(q){
  const s=(typeof q==="string"?q:"").toLowerCase();
  let head="",body="",act="";
  const is=(...ws)=>ws.some(w=>s.includes(w));
  if(is("tawaf","طواف")){
    const arr=P.filter(p=>!p.rit.tawaf);
    head=lang==="ar"?`${arr.length} حجاج لم يكملوا طواف القدوم`:`${arr.length} pilgrims haven't completed Tawaf al-Qudum`;
    body=nameList(arr);
    act=lang==="ar"?"اقتراح: نافذة منخفضة الكثافة في المطاف متوقعة بعد العشاء (٩:٣٠–١١م).":"Suggestion: a low-density Mataf window is expected after Isha (9:30–11 PM).";
  }else if(is("missing","مفقود","فقد")){
    const arr=missing.filter(m=>m.open);
    head=lang==="ar"?`${arr.length} بلاغ نشط`:`${arr.length} active report(s)`;
    body=arr.map(m=>`<div class="row"><span>${P[m.p].nat[0]} ${nm(P[m.p])} — ${t("m_lastseen")}: ${pick(ZONES[m.where])}</span><span class="mono">${m.since}</span></div>`).join("")||"✓";
    act=lang==="ar"?"البث فعّال لـ٦ مطوفين مجاورين، وأمن المشاعر مُخطَر عبر نُسك بيزنس.":"Broadcast live to 6 nearby mutawwifs; Mashaer Security notified via Nusuk Business.";
  }else if(is("heat","حرار","إجهاد","الشمس")){
    const arr=P.filter(p=>p.hr>100||+p.temp>37.6||p.age>65).sort((a,b)=>b.hr-a.hr);
    head=lang==="ar"?`${arr.length} حاجًا في دائرة الخطر (نبض مرتفع / حرارة / سن)`:`${arr.length} pilgrims at elevated risk (high HR / temp / age)`;
    body=nameList(arr);
    act=lang==="ar"?"إجراء مقترح: تنبيه سقيا فوري + تظليل المجموعة قبل تحرك الساعة ١٢.":"Suggested action: immediate hydration alert + shade the group before the 12:00 move.";
  }else if(is("scan","مسح","حضور","attend")){
    const arr=P.filter(p=>!p.scanned);
    head=lang==="ar"?`${arr.length} حجاج لم يُمسحوا اليوم`:`${arr.length} pilgrims not scanned today`;
    body=nameList(arr);
    act=lang==="ar"?"اقتراح: عدّ سريع عند بوابة الخيمة قبل النفرة.":"Suggestion: quick muster at the tent gate before Nafrah.";
  }else if(is("battery","بطاري")){
    const arr=P.filter(p=>p.batt<45).sort((a,b)=>a.batt-b.batt);
    head=lang==="ar"?`${arr.length} سوارًا تحت ٤٥٪`:`${arr.length} bands below 45%`;
    body=arr.slice(0,6).map(p=>`<div class="row"><span>${nm(p)}</span><span class="pill ${p.batt<40?"r":"a"} mono">${p.batt}%</span></div>`).join("");
    act=lang==="ar"?"نقطة الشحن: داخل المخيم م-٣ — أرسل تذكيرًا قبل المبيت بمزدلفة.":"Charging point: inside camp M-3 — push a reminder before the Muzdalifah night.";
  }else if(is("elder","كبار","سن","عمر")){
    const arr=P.filter(p=>p.age>=63).sort((a,b)=>b.age-a.age);
    head=lang==="ar"?`${arr.length} من كبار السن (٦٣+)`:`${arr.length} elderly pilgrims (63+)`;
    body=arr.map(p=>`<div class="row"><span>${p.nat[0]} ${nm(p)}</span><span class="pill s">${p.age}</span></div>`).join("");
    act=lang==="ar"?"عربات كبار السن متاحة عند نقطة م-٤ — تُحجز عبر نُسك.":"Elderly carts available at point M-4 — bookable via Nusuk.";
  }else if(is("drift","يبتعد","نطاق","perimeter","خرج")){
    const dl=driftList();
    head=lang==="ar"?`${dl.length} خارج نطاق ${FENCE_M}م حول مركز المجموعة (محسوبة من GPS الأساور)`:`${dl.length} outside the ${FENCE_M} m perimeter (computed from band GPS)`;
    body=dl.map(d=>`<div class="row"><span>${d.p.nat[0]} ${nm(d.p)} · ${d.dir}</span><span class="pill a mono">${d.d}${lang==="ar"?"م":" m"}</span></div>`).join("")||"✓";
    act=lang==="ar"?"إجراء: نبّه الأساور من شاشة الأساور، أو أرسل مرافقًا قبل أن يتحول الابتعاد إلى بلاغ فقد.":"Action: ping the bands from the Wearables screen, or send an escort before drift becomes a missing report.";
  }else{

  }

async function askAI(key){
  const raw=key||($("#aiIn").value||"").trim();if(!raw)return;
  const q=typeof key==="string"&&AI_QS.find(x=>x[0]===key)?pick(AI_QS.find(x=>x[0]===key)[1]):raw;
  if(glmReady()){
    $("#aiOut").innerHTML=`<p style="color:var(--muted);font-size:13px">${t("fq_loading")}</p>`;
    const ctx=buildGroupContext();
    const r=await callGLM([
      {role:"system",content:lang==="ar"
        ?"أنت رفيق — مساعد عمليات ميداني لمطوّف يدير ٤٥ حاجًا. أجب من بيانات المجموعة المرفقة فقط. كن مختصرًا وعمليًا. اقترح إجراءً واحدًا في النهاية."
        :"You are Rafeeq — a field-ops copilot for a mutawwif managing 45 pilgrims. Answer ONLY from the attached group data. Be concise and actionable. End with one suggested action."},
      {role:"user",content:`Group data (JSON):\n${JSON.stringify(ctx,null,2)}\n\nQuestion: ${q}`}
    ]);
    if(r.ok){showAiAnswer(lang==="ar"?"إجابة رفيق الذكي":"Rafeeq AI answer",`<p style="font-size:13.5px;line-height:1.75;white-space:pre-wrap">${r.text.replace(/</g,"&lt;")}</p>`,"", "glm");if(!key)$("#aiIn").value="";return;}
  }
  const {head,body,act}=rulesAnswer(q);
  showAiAnswer(head,body,act,"rules");
  if(!key)$("#aiIn").value="";
}

const _toast=toast;
toast=function(m){
  if(offline)_toast(m+(lang==="ar"?" · 📴 سيُزامَن":" · 📴 will sync"));
  else _toast(m);
};
/* ================= 90-SECOND DEMO SCENARIO ================= */
let demoTimers=[];
function runDemo(){
  demoTimers.forEach(clearTimeout);demoTimers=[];
  const step=(ms,fn)=>demoTimers.push(setTimeout(fn,ms));
  const D=lang==="ar";
  goView("dash");
  _toast(D?"🎬 العرض التوضيحي: يوم عرفة — تابع الشاشة":"🎬 Demo: Day of Arafah — watch the screen");
  step(4000,()=>{goView("crowd");setCrowdTab("data");_toast(D?"١/٦ — بصير: كثافة حرجة + تدفق داخلي > خارجي عند الجمرات":"1/6 — Baseer: critical density + more entering than leaving at Jamarat")});
  step(9000,()=>{suggestRoute();_toast(D?"٢/٦ — رفيق يقترح مسارًا بديلًا ويبثه للفريق":"2/6 — Rafeeq suggests a reroute and broadcasts it")});
  step(14000,()=>{goView("scan");doScan();_toast(D?"٣/٦ — تأكيد حضور ببطاقة نُسك في ثانية":"3/6 — Nusuk Card confirms presence in one second")});
  step(20000,()=>{goView("alerts");const cand=P.find(p=>p.status==="present"&&p.i!==13&&p.i!==33);missing.unshift({p:cand.i,where:1,since:new Date().toTimeString().slice(0,5),open:true});P[cand.i].status="miss";renderAll();_toast(D?"٤/٦ — بلاغ فقد عند المطاف: بث فوري للمطوفين المجاورين":"4/6 — Missing at the Mataf: instant broadcast to nearby mutawwifs");window._demoP=cand.i});
  step(28000,()=>{markFound(window._demoP);_toast(D?"٥/٦ — لمّ الشمل خلال دقائق بدل ساعات":"5/6 — Reunited in minutes, not hours")});
  step(34000,()=>{goView("wear");_toast(D?"٦/٦ — سوار + صحة الافتراضي: استغاثة SOS وبث ECG للقلب":"6/6 — Band + SEHA: SOS and live cardiac ECG stream to virtual hospital")});
  step(41000,()=>{goView("copilot");askAI("heat");_toast(D?"✨ ورفيق الذكي يجيب من بيانات المجموعة الحية":"✨ And Rafeeq AI answers from live group data")});
  step(48000,()=>{goView("dash");_toast(t("demo_end"))});
}
/* ================= BOOT ================= */
function fillModals(){
  fillSelect("#medWho",P.map(p=>[p.i,nm(p)]));
  fillSelect("#missWho",P.filter(p=>p.status!=="miss").map(p=>[p.i,nm(p)]));
  fillSelect("#missWhere",ZONES.map((z,i)=>[i,pick(z)]));
  const types=lang==="ar"?["إجهاد حراري","إغماء","ارتفاع ضغط","هبوط سكر","إصابة قدم","ألم صدري","أخرى"]:["Heat exhaustion","Fainting","High BP","Low glucose","Foot injury","Chest pain","Other"];
  fillSelect("#medType",types.map(x=>[x,x]));
  const sevs=lang==="ar"?[["g","بسيطة"],["a","متوسطة"],["r","حرجة"]]:[["g","Minor"],["a","Moderate"],["r","Critical"]];
  fillSelect("#medSev",sevs);
  const ents=lang==="ar"?["أمن المشاعر","الهلال الأحمر السعودي","الدفاع المدني","وزارة الحج والعمرة","النقل الترددي","إدارة المخيم"]:["Mashaer Security","Saudi Red Crescent","Civil Defense","Ministry of Hajj & Umrah","Shuttle Transport","Camp Management"];
  fillSelect("#coEnt",ents.map(x=>[x,x]));
}
function renderAll(){
  renderDash();renderGroup();renderCrowd();renderMed();renderMissing();renderScan();
  renderWear();renderTrans();renderExp();renderCoord();renderFiqh();renderReports();renderPitch();renderCopilot();renderBeads();fillModals();
  if(typeof renderAlertsInbox==="function")renderAlertsInbox();
  if(typeof renderActionStrip==="function")renderActionStrip();
  if(typeof renderSosStrip==="function")renderSosStrip();
  if(typeof renderHeatPanel==="function")renderHeatPanel();
  if(typeof renderRitualAlert==="function")renderRitualAlert();
  if(typeof renderPilotMetrics==="function")renderPilotMetrics();
  if(typeof renderQrPitch==="function")renderQrPitch();
  if(typeof renderManager==="function")renderManager();
  persist();
}
async function boot(){
  await restore();
  seedTrails();
  applyI18n();
  fillSettingsModal();
  $("#langBtn").textContent=lang==="ar"?"English":"العربية";
  $("#themeBtn").textContent=document.body.dataset.theme==="dark"?"☀️":"🌙";
  renderAll();
  updateSyncBadge();
  document.getElementById("simBadge")?.removeAttribute("hidden");
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("./sw.js",{scope:"./"}).catch(()=>{});
  }
}
boot();
/* Ambient simulation: vitals drift + band GPS micro-movement + trails */
setInterval(()=>{
  P.forEach(p=>{
    p.hr=Math.max(58,Math.min(128,p.hr+Math.round(Math.random()*6-3)));
    pushTrail(p);
    p.lat+=(Math.random()-.5)*0.00007;
    p.lng+=(Math.random()-.5)*0.00007;
  });
  if(curView==="crowd")renderCrowdMap();
  else if(curView==="wear")renderWear();
},4000);
</script>
